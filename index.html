<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Primary Meta Tags -->
    <title>Draw a Perfect Circle Game Challenge</title>
    <meta name="title" content="Draw a Perfect Circle">
    <meta name="description" content="Draw the most perfect circle possible around the center (within 5 seconds). Can you score 100%?">

    <!-- Favicon (Inline SVG for bright cyan circle) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23000' stroke='%2300e5ff' stroke-width='15'/></svg>">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://edulogos.github.io/g1/">
    <meta property="og:title" content="Draw a Perfect Circle">
    <meta property="og:description" content="Draw the most perfect circle possible around the center (within 5 seconds). Can you score 100%?">
    <meta property="og:image" content="https://edulogos.github.io/g1/ogimage.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://edulogos.github.io/g1/">
    <meta property="twitter:title" content="Draw a Perfect Circle">
    <meta property="twitter:description" content="Draw the most perfect circle possible around the center (within 5 seconds). Can you score 100%?">
    <meta property="twitter:image" content="https://edulogos.github.io/g1/ogimage.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; color: white; user-select: none; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        
        /* Intro Animation SVG Styles */
        .circle-path { fill: none; stroke-width: 2; stroke-linecap: round; transform-origin: center; }
        .anim-spin-1 { animation: spin 8s linear infinite, dash 4s ease-in-out infinite alternate; stroke: #ff3b30; }
        .anim-spin-2 { animation: spin-reverse 10s linear infinite, dash 5s ease-in-out infinite alternate; stroke: #34c759; }
        .anim-spin-3 { animation: spin 12s linear infinite, dash 6s ease-in-out infinite alternate; stroke: #007aff; }
        .anim-spin-4 { animation: spin-reverse 14s linear infinite, dash 7s ease-in-out infinite alternate; stroke: #af52de; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 89, 200; stroke-dashoffset: -35px; }
            100% { stroke-dasharray: 89, 200; stroke-dashoffset: -124px; }
        }

        /* Result Text Pop Animation */
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Cosmic Aura Animation */
        #cosmicAura {
            position: absolute;
            top: 50%; left: 50%;
            width: 150vmin; height: 150vmin;
            background: radial-gradient(circle, rgba(52, 199, 89, 0.25) 0%, rgba(52, 199, 89, 0) 60%);
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 1.5s ease-in-out;
            mix-blend-mode: screen;
        }
        #cosmicAura.active {
            opacity: 1;
            animation: pulseAura 4s infinite alternate ease-in-out;
        }
        @keyframes pulseAura {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* Toast Animation */
        #toast { transition: opacity 0.3s ease; }
    </style>
</head>
<body>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Cosmic Aura Overlay -->
    <div id="cosmicAura"></div>

    <!-- UI Overlay: Result Text -->
    <div id="resultText" class="absolute inset-0 flex items-center justify-center text-5xl md:text-7xl font-bold opacity-0 transition-opacity duration-300 pointer-events-none">
        <span id="scoreValue" class="text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]"></span>
    </div>

    <!-- UI Overlay: Warning Toast -->

            </div>

            <button onclick="downloadShareImage()" class="w-full py-3 bg-gray-800 text-gray-300 font-bold rounded-xl hover:bg-gray-700 border border-gray-700 transition flex justify-center items-center gap-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Score Image
            </button>
        </div>
    </div>

    <!-- Intro Overlay -->
    <div id="intro" class="absolute inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <!-- SVG Animation Background -->
        <svg class="absolute inset-0 w-full h-full opacity-50" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle class="circle-path anim-spin-1" cx="100" cy="100" r="40" />
            <circle class="circle-path anim-spin-2" cx="100" cy="100" r="60" />
            <circle class="circle-path anim-spin-3" cx="100" cy="100" r="80" />
            <circle class="circle-path anim-spin-4" cx="100" cy="100" r="95" />
        </svg>
        
        <!-- Content -->
        <div class="relative z-10 text-center flex flex-col items-center gap-8 px-4">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-white drop-shadow-lg">
                Draw a perfect circle
            </h1>
            <p class="text-gray-400 max-w-sm text-lg">Draw the most perfect circle possible around the center (within 5 seconds).</p>
            <button id="startBtn" class="mt-4 px-10 py-4 bg-white text-black text-2xl font-bold rounded-full hover:scale-105 hover:bg-gray-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.4)]">
                Start
            </button>
        </div>
    </div>

    <script>
        // --- Core Elements ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const intro = document.getElementById('intro');
        const startBtn = document.getElementById('startBtn');
        const resultText = document.getElementById('resultText');
        const scoreValue = document.getElementById('scoreValue');
        const toast = document.getElementById('toast');
        const muteBtn = document.getElementById('muteBtn');
        const iconUnmuted = document.getElementById('icon-unmuted');
        const iconMuted = document.getElementById('icon-muted');
        const replayToggleBtn = document.getElementById('replayToggleBtn');
        const iconReplayOn = document.getElementById('icon-replay-on');
        const iconReplayOff = document.getElementById('icon-replay-off');
        const mainShareBtn = document.getElementById('mainShareBtn');
        const shareModal = document.getElementById('shareModal');
        const shareModalContent = document.getElementById('shareModalContent');
        const closeShareModal = document.getElementById('closeShareModal');
        const shareImagePreview = document.getElementById('shareImagePreview');
        const bestScoreDisplay = document.getElementById('bestScoreDisplay');
        const bestScoreText = document.getElementById('bestScoreText');
        const cosmicAura = document.getElementById('cosmicAura');

        // --- Game State ---
        let width, height;
        let points = [];
        let isDrawing = false;
        let startTime = 0;
        let drawAnimFrame;
        let isMuted = false;
        let currentBestScore = 0;
        let isReplayEnabled = true; // Tekrar oynatma varsayılan olarak açık
        let isReplaying = false; // Prevents interactions during replay
        let bestPoints = []; // En yüksek puanlı çizimin koordinatlarını tutar
        let bestCx = 0;
        let bestCy = 0;

        // --- Load Daily Best from LocalStorage ---
        function loadDailyBest() {
            const savedData = localStorage.getItem('perfectCircleDailyBest');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    if (parsed.date === new Date().toDateString()) {
                        currentBestScore = parsed.score;
                        bestPoints = parsed.points;
                        bestCx = parsed.cx;
                        bestCy = parsed.cy;
                        
                        bestScoreDisplay.classList.remove('hidden');
                        bestScoreText.innerText = currentBestScore.toFixed(1) + "%";
                    } else {
                        localStorage.removeItem('perfectCircleDailyBest');
                    }
                } catch (e) {
                    console.error("Yerel veri yükleme hatası", e);
                }
            }
        }
        
        loadDailyBest();

        // --- Audio System (Web Audio API) ---
        let audioCtx;
        let pencilNoiseNode;
        let pencilFilter;
        let pencilGain;

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            const bufferSize = audioCtx.sampleRate * 2; 
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            pencilNoiseNode = audioCtx.createBufferSource();
            pencilNoiseNode.buffer = noiseBuffer;
            pencilNoiseNode.loop = true;

            pencilFilter = audioCtx.createBiquadFilter();
            pencilFilter.type = 'lowpass';
            pencilFilter.frequency.value = 800; 

            pencilGain = audioCtx.createGain();
            pencilGain.gain.value = 0; 

            pencilNoiseNode.connect(pencilFilter);
            pencilFilter.connect(pencilGain);
            pencilGain.connect(audioCtx.destination);
            pencilNoiseNode.start();
        }

        function playSoundByScore(score) {
            if (isMuted || !audioCtx || score < 50) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = 'sine';
            const now = audioCtx.currentTime;

            if (score >= 50 && score < 70) {
                osc.frequency.setValueAtTime(523.25, now);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(now);
                osc.stop(now + 1);
            } else if (score >= 70 && score < 90) {
                osc.frequency.setValueAtTime(659.25, now);
                osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                osc.start(now);
                osc.stop(now + 1.5);
            } else if (score >= 90) {
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);
                osc.frequency.setValueAtTime(783.99, now + 0.2);
                osc.frequency.setValueAtTime(1046.50, now + 0.3);
                gainNode.gain.setValueAtTime(0.6, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 2);
                osc.start(now);
                osc.stop(now + 2);
            }
        }

        // --- Resize & Setup ---
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            drawCenterDot();
        }
        window.addEventListener('resize', resize);
        resize();

        function drawCenterDot() {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.arc(width/2, height/2, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#00e5ff'; 
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00e5ff';
            ctx.fill();
            ctx.shadowBlur = 0; 
        }

        // --- Utility ---
        function showToast(message) {
            toast.innerText = message;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        // --- Events ---
        startBtn.addEventListener('click', () => {
            intro.style.opacity = '0';
            setTimeout(() => { intro.style.display = 'none'; }, 500);
            initAudio(); 
        });

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            iconUnmuted.classList.toggle('hidden', isMuted);
            iconMuted.classList.toggle('hidden', !isMuted);
            if (isMuted && audioCtx) pencilGain.gain.value = 0;
        });

        replayToggleBtn.addEventListener('click', () => {
            isReplayEnabled = !isReplayEnabled;
            iconReplayOn.classList.toggle('hidden', !isReplayEnabled);
            iconReplayOff.classList.toggle('hidden', isReplayEnabled);
        });

        mainShareBtn.addEventListener('click', () => {
            if(isReplaying || isDrawing) return; 

            generateShareImage(); 
            
            shareModal.classList.remove('pointer-events-none');
            shareModal.classList.remove('opacity-0');
            shareModalContent.classList.remove('scale-95');
            shareModalContent.classList.add('scale-100');
        });

        closeShareModal.addEventListener('click', closeShareWindow);
        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) closeShareWindow();
        });

        function closeShareWindow() {
            shareModal.classList.add('opacity-0');
            shareModal.classList.add('pointer-events-none');
            shareModalContent.classList.remove('scale-100');
            shareModalContent.classList.add('scale-95');
        }

        // Drawing Events
        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);

        function startDrawing(e) {
            if (isReplaying) return; 

            const rect = canvas.getBoundingClientRect();
            const startX = e.clientX - rect.left;
            const startY = e.clientY - rect.top;
            
            const cx = width / 2;
            const cy = height / 2;
            const distToCenter = Math.hypot(startX - cx, startY - cy);
            
            if (distToCenter < height * 0.10) {
                showToast("Please draw it bigger !");
                return;
            }

            resultText.style.opacity = '0';
            scoreValue.classList.remove('animate-pop');
            cosmicAura.classList.remove('active'); // Yeni çizimde aurayı gizle
            
            isDrawing = true;
            points = [];
            startTime = Date.now();
            drawCenterDot();
            
            points.push({ x: startX, y: startY });

            if (!isMuted && audioCtx && audioCtx.state === 'running') {
                pencilGain.gain.setTargetAtTime(0.08, audioCtx.currentTime, 0.05); // Hafif ses
            }

            loop(); 
        }

        function draw(e) {
            if (!isDrawing || isReplaying) return;
            const rect = canvas.getBoundingClientRect();
            points.push({
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            });
            renderPath(points);
        }

        function stopDrawing(e) {
            if (!isDrawing) return;
            isDrawing = false;
            cancelAnimationFrame(drawAnimFrame);
            
            if (!isMuted && audioCtx) {
                pencilGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }

            evaluateCircle();
        }

        function renderPath(pathPoints) {
            drawCenterDot();
            if (pathPoints.length < 2) return;

            ctx.beginPath();
            ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
            for (let i = 1; i < pathPoints.length; i++) {
                ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
            }
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function loop() {
            if (isDrawing) {
                const elapsed = Date.now() - startTime;
                if (elapsed > 5000) {
                    abortDrawing("Drawing is very slow !");
                    return;
                }
                drawAnimFrame = requestAnimationFrame(loop);
            }
        }

        function abortDrawing(message) {
            isDrawing = false;
            cancelAnimationFrame(drawAnimFrame);
            if (!isMuted && audioCtx) pencilGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            
            if (message) showToast(message);
            setTimeout(() => { drawCenterDot(); }, 300);
        }

        // --- Core Algorithm ---
        function evaluateCircle() {
            if (points.length < 15) {
                drawCenterDot(); 
                return;
            }

            let cx = 0, cy = 0;
            for (let p of points) { cx += p.x; cy += p.y; }
            cx /= points.length;
            cy /= points.length;

            let radii = [];
            let avgRadius = 0;
            for (let p of points) {
                let r = Math.hypot(p.x - cx, p.y - cy);
                radii.push(r);
                avgRadius += r;
            }
            avgRadius /= points.length;

            if (avgRadius < 20) {
                drawCenterDot(); 
                return;
            }

            let variance = 0;
            for (let r of radii) {
                variance += Math.pow(r - avgRadius, 2);
            }
            let stdDev = Math.sqrt(variance / points.length);

            let rawScore = 100 - ((stdDev / avgRadius) * 250);

            let startP = points[0];
            let endP = points[points.length - 1];
            let gap = Math.hypot(startP.x - endP.x, startP.y - endP.y);
            
            if (gap > avgRadius * 0.5) {
                rawScore -= 50; 
            }

            let finalScore = Math.max(0, Math.min(100, rawScore));
            finalScore = Math.round(finalScore * 10) / 10;

            if (isReplayEnabled) {
                startReplay(finalScore);
            } else {
                showResult(finalScore);
            }
        }

        function startReplay(finalScore) {
            isReplaying = true;
            drawCenterDot(); 
            
            let replayPoints = [];
            let pointIndex = 0;
            const replaySpeed = Math.max(1, Math.floor(points.length / 60)); 

            function drawNextFrame() {
                if (pointIndex < points.length) {
                    for(let i=0; i<replaySpeed; i++) {
                        if(points[pointIndex]) {
                            replayPoints.push(points[pointIndex]);
                            pointIndex++;
                        }
                    }
                    renderPath(replayPoints);
                    requestAnimationFrame(drawNextFrame);
                } else {
                    isReplaying = false;
                    showResult(finalScore);
                }
            }

            requestAnimationFrame(drawNextFrame);
        }

        function showResult(score) {
            scoreValue.innerText = score.toFixed(1) + "%";
            
            if (score >= 90) {
                scoreValue.className = "drop-shadow-[0_0_15px_rgba(52,199,89,1)] text-[#34c759]";
                cosmicAura.classList.add('active'); 
            }
            else if (score >= 70) scoreValue.className = "drop-shadow-[0_0_10px_rgba(255,255,255,1)] text-white";
            else if (score >= 50) scoreValue.className = "drop-shadow-[0_0_10px_rgba(255,149,0,1)] text-[#ff9500]";
            else scoreValue.className = "drop-shadow-[0_0_10px_rgba(255,59,48,1)] text-[#ff3b30]";

            scoreValue.classList.add('animate-pop');
            resultText.style.opacity = '1';

            playSoundByScore(score);
            updateBestScore(score);
        }

        function updateBestScore(newScore) {
            if (newScore > currentBestScore) {
                currentBestScore = newScore;
                bestPoints = [...points]; 
                bestCx = width / 2;
                bestCy = height / 2;
                
                bestScoreDisplay.classList.remove('hidden');
                bestScoreText.innerText = currentBestScore.toFixed(1) + "%";

                const dailyData = {
                    date: new Date().toDateString(),
                    score: currentBestScore,
                    points: bestPoints,
                    cx: bestCx,
                    cy: bestCy
                };
                localStorage.setItem('perfectCircleDailyBest', JSON.stringify(dailyData));
            }
        }

        // --- Generate Share Image (Canvas Drawing) ---
        function generateShareImage() {
            const c = document.createElement('canvas');
            c.width = 800;
            c.height = 450;
            const context = c.getContext('2d');

            context.fillStyle = '#000000';
            context.fillRect(0, 0, c.width, c.height);

            const cx = c.width / 2;
            const cy = c.height / 2;
            
            const textCx = 240;  
            const shapeCx = 560; 
            const contentCy = 230; 

            if (currentBestScore >= 90) {
                const bgGrad = context.createRadialGradient(cx, cy, 0, cx, cy, c.width);
                bgGrad.addColorStop(0, '#0a1a0f'); 
                bgGrad.addColorStop(1, '#000000'); 
                context.fillStyle = bgGrad;
                context.fillRect(0, 0, c.width, c.height);

                const auraGrad = context.createRadialGradient(shapeCx, contentCy, 0, shapeCx, contentCy, 300);
                auraGrad.addColorStop(0, 'rgba(52, 199, 89, 0.35)');
                auraGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                context.fillStyle = auraGrad;
                context.fillRect(0, 0, c.width, c.height);

                for(let i = 0; i < 80; i++) {
                    context.beginPath();
                    context.arc(Math.random() * c.width, Math.random() * c.height, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
                    context.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.1})`;
                    context.fill();
                }
            } else {
                const gradient = context.createRadialGradient(cx, cy, 0, cx, cy, c.width);
                gradient.addColorStop(0, '#1a1a1a'); 
                gradient.addColorStop(1, '#000000'); 
                context.fillStyle = gradient;
                context.fillRect(0, 0, c.width, c.height);
            }

            if (bestPoints.length > 0) {
                let maxR = 0;
                for (let p of bestPoints) {
                    let r = Math.hypot(p.x - bestCx, p.y - bestCy);
                    if (r > maxR) maxR = r;
                }
                
                const scale = maxR > 0 ? 140 / maxR : 1;

                context.beginPath();
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.lineWidth = 6;
                context.strokeStyle = currentBestScore >= 90 ? '#34c759' : '#00e5ff'; 
                
                context.shadowBlur = currentBestScore >= 90 ? 25 : 15;
                context.shadowColor = currentBestScore >= 90 ? '#34c759' : '#00e5ff';

                for (let i = 0; i < bestPoints.length; i++) {
                    let dx = bestPoints[i].x - bestCx;
                    let dy = bestPoints[i].y - bestCy;
                    
                    let sx = shapeCx + dx * scale;
                    let sy = contentCy + dy * scale;

                    if (i === 0) context.moveTo(sx, sy);
                    else context.lineTo(sx, sy);
                }
                context.stroke();
                
                context.shadowBlur = 0;
                context.strokeStyle = '#ffffff';
                context.lineWidth = 2;
                context.stroke();

                context.beginPath();
                context.arc(shapeCx, contentCy, 4, 0, Math.PI * 2);
                context.fillStyle = currentBestScore >= 90 ? '#34c759' : '#00e5ff';
                context.fill();

            } else {
                const colors = ['#ff3b30', '#34c759', '#007aff', '#af52de'];
                const radii = [50, 80, 110, 140];
                
                context.lineWidth = 5;
                colors.forEach((color, i) => {
                    context.beginPath();
                    context.arc(shapeCx, contentCy, radii[i], 0, Math.PI * 2);
                    context.strokeStyle = color;
                    context.shadowBlur = 15;
                    context.shadowColor = color;
                    context.stroke();
                    context.shadowBlur = 0; 
                    context.stroke();
                });
            }

            context.textAlign = 'center';
            context.textBaseline = 'middle';
            
            context.shadowBlur = 8;
            context.shadowColor = '#000000';

            context.font = 'bold 36px sans-serif';
            context.fillStyle = '#ffffff';
            context.fillText('Draw a perfect circle', cx, 60);

            context.font = '24px sans-serif';
            context.fillStyle = '#aaaaaa';
            context.fillText('My Best Score', textCx, 150);

            context.font = 'bold 110px sans-serif';
            let scoreStr = (currentBestScore || 0).toFixed(1) + '%';
            if (currentBestScore >= 90) context.fillStyle = '#34c759';
            else if (currentBestScore >= 70) context.fillStyle = '#ffffff';
            else if (currentBestScore >= 50) context.fillStyle = '#ff9500';
            else context.fillStyle = '#ff3b30';
            
            context.shadowBlur = 25;
            context.shadowColor = context.fillStyle;
            context.fillText(scoreStr, textCx, 250);
            
            context.shadowBlur = 8;
            context.shadowColor = '#000000';
            context.font = '20px monospace';
            context.fillStyle = '#888888';
            let siteUrl = window.location.hostname || 'perfect-circle.game';
            context.fillText(siteUrl, cx, 400);

            context.shadowBlur = 0; 

            context.textAlign = 'right';
            context.font = '14px monospace';
            context.fillStyle = '#555555';
            const now = new Date();
            const dateStr = now.toLocaleDateString('tr-TR') + ' ' + now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
            context.fillText(dateStr, c.width - 20, c.height - 20);

            shareImagePreview.src = c.toDataURL('image/png');
        }

        function downloadShareImage() {
            const link = document.createElement('a');
            link.download = `perfect-circle-score-${(currentBestScore || 0).toFixed(1)}.png`;
            link.href = shareImagePreview.src;
            link.click();
        }

        async function shareScore(platform) {
            const text = `I drew a perfect circle and scored ${(currentBestScore || 0).toFixed(1)}%! How good are you?`;
            const url = window.location.href;
            const shareText = text + '\n\n' + url; 
            
            if (navigator.canShare) {
                try {
                    const response = await fetch(shareImagePreview.src);
                    const blob = await response.blob();
                    const file = new File([blob], 'my-score.png', { type: 'image/png' });
                    
                    if (navigator.canShare({ files: [file] })) {
                         await navigator.share({
                             title: 'Perfect Circle Score',
                             text: shareText, 
                             files: [file]
                         });
                         closeShareWindow();
                         return; 
                    }
                } catch (e) {
                    console.log("Native share fallback triggered");
                }
            }

            let shareUrl = '';
            switch(platform) {
                case 'whatsapp': shareUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`; break;
                case 'twitter': shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`; break;
                case 'facebook': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`; break;
                case 'telegram': shareUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`; break;
                case 'linkedin': shareUrl = `https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}&title=${encodeURIComponent('Perfect Circle Score')}&summary=${encodeURIComponent(text)}`; break;
                case 'reddit': shareUrl = `https://reddit.com/submit?url=${encodeURIComponent(url)}&title=${encodeURIComponent(text)}`; break;
                case 'pinterest': shareUrl = `https://pinterest.com/pin/create/button/?url=${encodeURIComponent(url)}&description=${encodeURIComponent(text)}`; break;
                case 'instagram':
                case 'tiktok':
                case 'discord':
                    downloadShareImage();
                    showToast(`Image saved! Open ${platform} to post it.`);
                    return;
            }
            if (shareUrl) window.open(shareUrl, '_blank');
        }

    </script>
